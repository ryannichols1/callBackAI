<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CallBack AI — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700;900&family=Epilogue:wght@400;500;600;700&display=swap" rel="stylesheet">
<script async crossorigin="anonymous"
  data-clerk-publishable-key="pk_test_dW5pZmllZC1jcmF3ZGFkLTYxLmNsZXJrLmFjY291bnRzLmRldiQ"
  src="https://unified-crawdad-61.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js"
  type="text/javascript"></script>
<style>
:root {
  --bg: #faf8f4;
  --ink: #16120e;
  --accent: #ff4d1c;
  --muted: #9a9389;
  --surface: #ffffff;
  --border: #e8e3db;
  --green: #1a7a4a;
  --green-soft: #e8f5ee;
  --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 4px 16px rgba(0,0,0,0.04);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Epilogue', sans-serif;
  min-height: 100vh;
}

/* ── Loading ── */
#loading-screen {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: var(--bg);
}
.spinner {
  width: 32px; height: 32px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Auth screen ── */
#auth-screen {
  display: none;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  background: var(--bg);
}

/* ── Dashboard ── */
#dashboard {
  display: none;
  min-height: 100vh;
}

.layout {
  display: flex;
  min-height: 100vh;
}

/* ── Sidebar ── */
.sidebar {
  width: 232px;
  background: var(--ink);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
}

.sidebar-logo {
  padding: 24px 20px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.logo-name {
  font-family: 'Fraunces', serif;
  font-weight: 900;
  font-size: 18px;
  color: #fff;
  letter-spacing: -0.03em;
}
.logo-dot { color: var(--accent); }
.logo-sub {
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  margin-top: 2px;
  font-weight: 500;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

.biz-block {
  padding: 16px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.biz-name {
  font-size: 13px;
  font-weight: 600;
  color: #fff;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.biz-industry {
  font-size: 11px;
  color: rgba(255,255,255,0.4);
  margin-top: 2px;
  text-transform: capitalize;
}

.nav {
  flex: 1;
  padding: 12px 0;
}
.nav-section {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  padding: 12px 20px 4px;
}
.nav-item {
  padding: 9px 20px;
  font-size: 13px;
  font-weight: 500;
  color: rgba(255,255,255,0.6);
  cursor: pointer;
  border-radius: 0;
  transition: color 0.15s, background 0.15s;
}
.nav-item:hover { color: #fff; background: rgba(255,255,255,0.06); }
.nav-item.active { color: #fff; background: rgba(255,255,255,0.1); }
.nav-badge {
  display: inline-block;
  background: var(--accent);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  border-radius: 20px;
  padding: 1px 6px;
  margin-left: 6px;
}

.sidebar-footer {
  padding: 16px 20px;
  border-top: 1px solid rgba(255,255,255,0.08);
}
.signout-btn {
  width: 100%;
  padding: 9px 14px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 6px;
  color: rgba(255,255,255,0.6);
  font-size: 13px;
  font-weight: 500;
  font-family: 'Epilogue', sans-serif;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
}
.signout-btn:hover { background: rgba(255,255,255,0.14); color: #fff; }

/* ── Main ── */
.main {
  margin-left: 232px;
  flex: 1;
  padding: 32px;
  max-width: 1100px;
}

.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 28px;
}
.page-title {
  font-family: 'Fraunces', serif;
  font-size: 26px;
  font-weight: 900;
  letter-spacing: -0.03em;
  color: var(--ink);
}
.status-pill {
  display: flex;
  align-items: center;
  gap: 7px;
  background: var(--green-soft);
  color: var(--green);
  font-size: 12px;
  font-weight: 600;
  padding: 6px 12px;
  border-radius: 20px;
}
.status-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse 2s ease-in-out infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.4; }
}

/* ── Stats ── */
.stats-row {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-bottom: 28px;
}
.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  box-shadow: var(--shadow);
  position: relative;
  overflow: hidden;
}
.stat-accent {
  position: absolute;
  top: 0; left: 0; right: 0;
  height: 3px;
}
.stat-accent.red { background: var(--accent); }
.stat-accent.green { background: var(--green); }
.stat-accent.yellow { background: #d4850a; }
.stat-accent.blue { background: #1a4fd4; }
.stat-label {
  font-size: 11px;
  font-weight: 600;
  color: var(--muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 8px;
}
.stat-value {
  font-family: 'Fraunces', serif;
  font-size: 30px;
  font-weight: 900;
  letter-spacing: -0.04em;
  color: var(--ink);
  line-height: 1;
}
.stat-delta {
  font-size: 11px;
  color: var(--muted);
  margin-top: 6px;
}

/* ── Call list ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: var(--shadow);
  overflow: hidden;
}
.card-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.card-title {
  font-size: 14px;
  font-weight: 700;
  color: var(--ink);
}

.call-item {
  padding: 14px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 14px;
  transition: background 0.12s;
}
.call-item:last-child { border-bottom: none; }
.call-item:hover { background: #fdfcfa; }

.call-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: var(--ink);
  color: #fff;
  font-size: 13px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.call-info { flex: 1; min-width: 0; }
.call-number {
  font-size: 14px;
  font-weight: 600;
  color: var(--ink);
}
.call-time {
  font-size: 12px;
  color: var(--muted);
  margin-top: 2px;
}

.call-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  flex-shrink: 0;
}

.status-tag {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 4px;
  text-transform: capitalize;
}
.status-tag.missed { background: #fde8e3; color: #c43d1a; }
.status-tag.replied { background: #e8f5ee; color: var(--green); }
.status-tag.converted { background: #e8f5ee; color: var(--green); }

.convert-btn {
  padding: 5px 12px;
  background: var(--ink);
  color: #fff;
  border: none;
  border-radius: 5px;
  font-size: 12px;
  font-weight: 600;
  font-family: 'Epilogue', sans-serif;
  cursor: pointer;
  transition: opacity 0.15s;
}
.convert-btn:hover { opacity: 0.8; }
.convert-btn:disabled { opacity: 0.4; cursor: default; }

.empty-state {
  padding: 48px 20px;
  text-align: center;
  color: var(--muted);
  font-size: 14px;
}

/* ── Error banner ── */
.error-banner {
  background: #fde8e3;
  border: 1px solid #f5c3b7;
  color: #c43d1a;
  border-radius: 8px;
  padding: 14px 18px;
  font-size: 14px;
  margin-bottom: 24px;
}

/* ── DEBUG: fatal error overlay (fixed top bar) ── */
#fatal-error {
  display: none;
  position: fixed;
  top: 0; left: 0; right: 0;
  background: #c0392b;
  color: #fff;
  padding: 18px 24px;
  font-family: 'Courier New', monospace;
  font-size: 13px;
  font-weight: 700;
  z-index: 9999;
  white-space: pre-wrap;
  word-break: break-all;
  line-height: 1.5;
}

/* ── DEBUG: step log shown on loading screen ── */
#debug-panel {
  margin-top: 20px;
  background: #111;
  border-radius: 8px;
  padding: 14px 16px;
  width: 500px;
  max-width: 92vw;
  font-family: 'Courier New', monospace;
  font-size: 12px;
  color: #ccc;
  max-height: 260px;
  overflow-y: auto;
  text-align: left;
}
#debug-panel .dbg-header {
  font-size: 10px;
  color: #555;
  text-transform: uppercase;
  letter-spacing: 0.07em;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
}
.dbg-line { margin-bottom: 3px; line-height: 1.4; }
.dbg-line.ok  { color: #5ddb8a; }
.dbg-line.err { color: #ff6b6b; font-weight: 700; }
</style>
</head>
<body>

<!-- Fatal error overlay (DEBUG) -->
<div id="fatal-error"></div>

<!-- Loading -->
<div id="loading-screen">
  <div style="display:flex;flex-direction:column;align-items:center;padding:32px">
    <div class="spinner" id="boot-spinner"></div>
    <div id="debug-panel">
      <div class="dbg-header">
        <span>Debug Log</span>
        <span id="dbg-time">0.0s</span>
      </div>
      <div id="debug-lines"></div>
    </div>
  </div>
</div>

<!-- Auth -->
<div id="auth-screen">
  <div>
    <div style="text-align:center;margin-bottom:24px">
      <div style="font-family:'Fraunces',serif;font-weight:900;font-size:22px;letter-spacing:-0.03em">
        CallBack<span style="color:var(--accent)">.</span>ai
      </div>
      <div style="font-size:13px;color:var(--muted);margin-top:6px">
        Sign in to manage your missed calls
      </div>
    </div>
    <div id="clerk-sign-in"></div>
  </div>
</div>

<!-- Dashboard -->
<div id="dashboard">
  <div class="layout">

    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-name">CallBack<span class="logo-dot">.</span>ai</div>
        <div class="logo-sub">Missed Call Recovery</div>
      </div>
      <div class="biz-block">
        <div class="biz-name" id="sidebarBizName">Loading...</div>
        <div class="biz-industry" id="sidebarBizIndustry"></div>
      </div>
      <nav class="nav">
        <div class="nav-section">Main</div>
        <div class="nav-item active">
          Missed Calls
          <span class="nav-badge" id="navBadge" style="display:none"></span>
        </div>
      </nav>
      <div class="sidebar-footer">
        <button class="signout-btn" onclick="signOut()">Sign out</button>
      </div>
    </aside>

    <main class="main">
      <div class="topbar">
        <div class="page-title">Missed Calls</div>
        <div class="status-pill">
          <span class="status-dot"></span>
          Auto-Reply Active
        </div>
      </div>

      <div id="error-area"></div>

      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-accent red"></div>
          <div class="stat-label">Missed This Week</div>
          <div class="stat-value" id="statMissed">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-accent green"></div>
          <div class="stat-label">Replied</div>
          <div class="stat-value" id="statReplied">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-accent yellow"></div>
          <div class="stat-label">Converted</div>
          <div class="stat-value" id="statConverted">—</div>
        </div>
        <div class="stat-card">
          <div class="stat-accent blue"></div>
          <div class="stat-label">Total Calls</div>
          <div class="stat-value" id="statTotal">—</div>
        </div>
      </div>

      <div class="card">
        <div class="card-header">
          <div class="card-title">Incoming Calls</div>
        </div>
        <div id="callList"><div class="empty-state">Loading calls...</div></div>
      </div>
    </main>

  </div>
</div>

<script>
const API = 'https://callbackai-production.up.railway.app';
const _t0  = Date.now();

// ── Tiny debug log (visible on screen + console) ──────────────────────────────
function dbg(msg, type) {
  const s = ((Date.now() - _t0) / 1000).toFixed(1);
  const timeEl = document.getElementById('dbg-time');
  if (timeEl) timeEl.textContent = s + 's';
  const lines = document.getElementById('debug-lines');
  if (lines) {
    const d = document.createElement('div');
    d.className = 'dbg-line' + (type ? ' ' + type : '');
    d.textContent = '[' + s + 's] ' + msg;
    lines.appendChild(d);
    lines.scrollTop = lines.scrollHeight;
  }
  console.log('[' + s + 's] ' + msg);
}

// Show a permanent red bar at the top of the page AND stop the spinner.
// Nothing should spin forever — every code path must call this or show().
function fatalError(msg) {
  document.getElementById('boot-spinner').style.display = 'none';
  dbg('FATAL: ' + msg, 'err');
  const el = document.getElementById('fatal-error');
  el.textContent = 'Error: ' + msg;
  el.style.display = 'block';
}

// Reject a promise if it hasn't resolved within `ms` milliseconds.
function withTimeout(p, ms, label) {
  return Promise.race([p,
    new Promise((_, rej) => setTimeout(() =>
      rej(new Error('Timed out after ' + (ms/1000) + 's: ' + label)), ms))]);
}

// ── Screen switching ──────────────────────────────────────────────────────────
function show(id) {
  document.getElementById('loading-screen').style.display = id === 'loading-screen' ? 'flex'  : 'none';
  document.getElementById('auth-screen').style.display    = id === 'auth-screen'    ? 'flex'  : 'none';
  document.getElementById('dashboard').style.display      = id === 'dashboard'      ? 'block' : 'none';
}

// Show sign-in widget — used both on first load and on 401.
// afterSignInUrl uses only origin+pathname, never query params, to avoid
// URL accumulation across multiple redirects.
function mountSignIn(clerk) {
  show('auth-screen');
  clerk.mountSignIn(document.getElementById('clerk-sign-in'), {
    afterSignInUrl: window.location.origin + window.location.pathname,
    afterSignUpUrl: window.location.origin + window.location.pathname,
  });
}

async function signOut() {
  await window.Clerk.signOut();
  mountSignIn(window.Clerk);
}

// ── Dashboard data loader ─────────────────────────────────────────────────────
async function loadDashboard(clerk) {
  // Step A: email
  const email = clerk.user.primaryEmailAddress?.emailAddress;
  dbg('A: email = ' + (email || 'NONE'));
  if (!email) {
    show('dashboard');
    document.getElementById('error-area').innerHTML =
      '<div class="error-banner">No email address found on your Clerk account. Please contact support.</div>';
    document.getElementById('callList').innerHTML = '';
    return;
  }

  // Step B: get JWT — session must exist here since clerk.user is set
  dbg('B: calling clerk.session.getToken()...');
  let token;
  try {
    if (!clerk.session) throw new Error('clerk.session is null');
    token = await withTimeout(clerk.session.getToken(), 5000, 'getToken');
    dbg('B: token ok — ' + token.slice(0, 20) + '...', 'ok');
  } catch (e) {
    fatalError('Could not get session token: ' + e.message);
    return;
  }

  // Step C: fetch business
  dbg('C: GET /api/my-business  email=' + email);
  let biz;
  try {
    const r = await withTimeout(
      fetch(API + '/api/my-business', {
        headers: { 'Authorization': 'Bearer ' + token, 'X-User-Email': email }
      }), 8000, 'GET /api/my-business');

    dbg('C: HTTP ' + r.status);

    if (r.status === 401) {
      // Token rejected by server — session is stale, force re-login
      dbg('C: 401 — session rejected, re-mounting sign-in', 'err');
      mountSignIn(clerk);
      // Re-attach listener so the next login continues normally
      clerk.addListener(({ user }) => {
        if (user) { dbg('re-login: user detected', 'ok'); loadDashboard(clerk); }
      });
      return;
    }
    if (r.status === 404) {
      show('dashboard');
      document.getElementById('error-area').innerHTML =
        '<div class="error-banner">No account found for <strong>' + email + '</strong>. ' +
        '<a href="callback-onboarding.html">Sign up here</a>.</div>';
      document.getElementById('callList').innerHTML = '';
      dbg('C: 404 — no business for this email', 'err');
      return;
    }
    if (!r.ok) {
      let msg = 'HTTP ' + r.status;
      try { msg = (await r.json()).error || msg; } catch (_) {}
      throw new Error(msg);
    }
    biz = await r.json();
    dbg('C: business = "' + biz.name + '" id=' + biz.id, 'ok');
  } catch (e) {
    fatalError('Could not load business data: ' + e.message);
    return;
  }

  // All data loaded — now switch to the dashboard view
  show('dashboard');
  document.getElementById('sidebarBizName').textContent    = biz.name;
  document.getElementById('sidebarBizIndustry').textContent = biz.industry || '';

  // Step D: fetch calls
  dbg('D: GET /api/businesses/' + biz.id + '/calls');
  let calls = [];
  try {
    const r = await withTimeout(
      fetch(API + '/api/businesses/' + biz.id + '/calls', {
        headers: { 'Authorization': 'Bearer ' + token }
      }), 8000, 'GET /calls');

    dbg('D: HTTP ' + r.status);
    if (!r.ok) {
      let msg = 'HTTP ' + r.status;
      try { msg = (await r.json()).error || msg; } catch (_) {}
      throw new Error(msg);
    }
    calls = await r.json();
    dbg('D: ' + calls.length + ' call(s) loaded', 'ok');
  } catch (e) {
    document.getElementById('error-area').innerHTML =
      '<div class="error-banner">Could not load calls: ' + e.message + '</div>';
    dbg('D: calls failed — ' + e.message, 'err');
    // Still render stats at zero rather than leaving the page broken
  }

  // Step E: render stats
  const cutoff    = Date.now() - 7 * 24 * 60 * 60 * 1000;
  const weekCalls = calls.filter(c => new Date(c.created_at).getTime() > cutoff);
  document.getElementById('statMissed').textContent    = weekCalls.filter(c => c.status === 'missed').length;
  document.getElementById('statReplied').textContent   = calls.filter(c => c.status === 'replied').length;
  document.getElementById('statConverted').textContent = calls.filter(c => c.status === 'converted').length;
  document.getElementById('statTotal').textContent     = calls.length;

  const missedCount = weekCalls.filter(c => c.status === 'missed').length;
  const badge = document.getElementById('navBadge');
  if (missedCount > 0) { badge.textContent = missedCount; badge.style.display = 'inline-block'; }

  dbg('E: rendering ' + calls.length + ' calls', 'ok');
  renderCalls(calls, biz.id, token);
}

function renderCalls(calls, bizId, token) {
  const list = document.getElementById('callList');
  if (!calls.length) {
    list.innerHTML = '<div class="empty-state">No calls yet. Once your number is forwarded, missed calls will appear here.</div>';
    return;
  }
  list.innerHTML = calls.map(c => {
    const letter  = (c.caller_name || c.caller_number || '?')[0].toUpperCase();
    const display = c.caller_name || c.caller_number || 'Unknown';
    const time    = new Date(c.created_at).toLocaleString('en-IE', {
      day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
    const btn = c.status !== 'converted'
      ? '<button class="convert-btn" onclick="markConverted(\'' + c.id + '\',this,\'' + token + '\')">Mark Converted</button>'
      : '';
    return '<div class="call-item" id="call-' + c.id + '">'
      + '<div class="call-avatar">' + letter + '</div>'
      + '<div class="call-info"><div class="call-number">' + display + '</div>'
      + '<div class="call-time">' + time + '</div></div>'
      + '<div class="call-actions"><span class="status-tag ' + c.status + '">' + c.status + '</span>' + btn + '</div>'
      + '</div>';
  }).join('');
}

async function markConverted(callId, btn, token) {
  btn.disabled = true; btn.textContent = 'Saving...';
  try {
    const r = await fetch(API + '/api/calls/' + callId + '/convert', {
      method: 'POST', headers: { 'Authorization': 'Bearer ' + token }
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const row = document.getElementById('call-' + callId);
    row.querySelector('.status-tag').className = 'status-tag converted';
    row.querySelector('.status-tag').textContent = 'converted';
    btn.remove();
    const el = document.getElementById('statConverted');
    el.textContent = (parseInt(el.textContent) || 0) + 1;
  } catch (e) {
    btn.disabled = false; btn.textContent = 'Mark Converted';
  }
}

// ── Boot sequence ─────────────────────────────────────────────────────────────
// Step 1: Wait for the async Clerk CDN script to define window.Clerk
// Step 2: Call clerk.load() which reads the session cookie
// Step 3: If user → load dashboard. If no user → show sign-in widget.
// After sign-in Clerk redirects back to this exact page (afterSignInUrl),
// boot() runs again, now clerk.user exists, and step 3 goes straight to dashboard.

function waitForClerk(ms) {
  return new Promise((resolve, reject) => {
    if (window.Clerk) return resolve(window.Clerk);
    const t = setTimeout(() =>
      reject(new Error('Clerk SDK did not load in ' + (ms/1000) + 's — check network / CSP')), ms);
    const i = setInterval(() => {
      if (window.Clerk) { clearTimeout(t); clearInterval(i); resolve(window.Clerk); }
    }, 50);
  });
}

async function boot() {
  dbg('1: waiting for Clerk SDK...');

  // Hard 8-second guard: if boot() hasn't called show() by then, something
  // is completely stuck and the user deserves an error, not an infinite spinner.
  const guard = setTimeout(() =>
    fatalError('Timed out after 8s. Last step: see debug log above.'), 8000);

  let clerk;
  try {
    clerk = await waitForClerk(5000);
    dbg('1: Clerk SDK ready', 'ok');
  } catch (e) {
    clearTimeout(guard);
    fatalError(e.message);
    return;
  }

  dbg('2: calling clerk.load()...');
  try {
    await withTimeout(clerk.load(), 5000, 'clerk.load()');
    dbg('2: clerk.load() done', 'ok');
  } catch (e) {
    clearTimeout(guard);
    fatalError('clerk.load() failed: ' + e.message);
    return;
  }

  clearTimeout(guard); // boot succeeded — data loading has its own timeouts

  const email = clerk.user?.primaryEmailAddress?.emailAddress;
  dbg('3: user = ' + (clerk.user ? 'YES (' + email + ')' : 'NO'));

  if (clerk.user) {
    // User already signed in (page loaded or redirected back after sign-in)
    await loadDashboard(clerk);
  } else {
    // No session — show the sign-in widget
    dbg('3: no session — showing sign-in', 'ok');
    mountSignIn(clerk);

    // addListener covers the edge case where Clerk resolves the session
    // in-page without a full redirect (e.g. same-tab pop-up flows)
    clerk.addListener(({ user }) => {
      if (user) {
        dbg('3: listener fired — user signed in', 'ok');
        loadDashboard(clerk);
      }
    });
  }
}

document.addEventListener('DOMContentLoaded', boot);
</script>
</body>
</html>
